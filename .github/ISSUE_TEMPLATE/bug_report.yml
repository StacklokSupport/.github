name: 🐛 Bug Report
description: Report a software defect or error in ToolHive
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all required fields so we can investigate efficiently.
        
        > **Note:** Support for MCP servers not built and maintained by ToolHive is provided on a reasonable-efforts basis only.

  - type: dropdown
    id: severity
    attributes:
      label: Severity Level
      description: Select the severity that best describes the impact of this bug.
      options:
        - "1 - Critical: System is down or data loss is occurring"
        - "2 - High: Major functionality is impaired, no workaround"
        - "3 - Medium: Functionality is impaired, workaround exists"
        - "4 - Low: Minor issue, cosmetic, or minimal impact"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of ToolHive is affected?
      options:
        - Kubernetes Operator
        - MCP Runtime
        - Registry Server
        - Unified Gateway
        - Desktop UI
        - Web UI
        - Other / Unsure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "What went wrong? What did you expect to happen instead?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide relevant environment details.
      placeholder: |
        - ToolHive version:
        - Kubernetes version (if applicable):
        - OS / Platform:
        - Cloud provider (if applicable):
        - Any relevant config or deployment details:
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact on Your Operations
      description: How is this bug affecting your team or workloads? Include any business impact or workarounds in use.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs that may be helpful.
